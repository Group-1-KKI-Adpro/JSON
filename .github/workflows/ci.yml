name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: chmod +x ./gradlew
      - run: ./gradlew test

  dummy-deploy:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - run: echo "Dummy CD: deploy allowed because CI passed"